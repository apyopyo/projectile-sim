<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>Projectile Simulator — 弾道パターンカタログ</title>
<style>
body{margin:0;background:#111;color:#fff;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh}
h1{margin-top:40px;color:#ffaa00;font-size:28px}
p.sub{color:#888;margin-top:4px;font-size:14px}
.cards{display:flex;flex-wrap:wrap;gap:20px;justify-content:center;margin-top:30px;padding:0 20px}
.card{background:#1a1a1a;border:1px solid #333;border-radius:10px;padding:20px;width:280px;cursor:pointer;transition:all 0.2s}
.card:hover{border-color:#ffaa00;transform:translateY(-3px);box-shadow:0 6px 20px rgba(255,170,0,0.15)}
.card h3{margin:0 0 8px 0;color:#ffaa00;font-size:18px}
.card p{color:#aaa;font-size:13px;line-height:1.5;margin:0}
.card .tag{display:inline-block;background:#222;color:#888;font-size:11px;padding:2px 8px;border-radius:4px;margin-top:10px}
footer{margin-top:auto;padding:30px;color:#444;font-size:12px}
</style>
</head>
<body>
<h1>🎯 Projectile Simulator</h1>
<p class="sub">3Dアクションゲーム プロジェクタイル弾道パターンカタログ</p>

<div class="cards">
  <div class="card" onclick="location.href='alternating.html'">
    <h3>↔️ 左右交互オフセット弾</h3>
    <p>プレイヤー方向を基準に左右交互にオフセット。回避を左右に強制させる弾道パターン。</p>
    <span class="tag">WASD移動 + Spaceジャンプ</span>
  </div>
